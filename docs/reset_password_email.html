<!--
  Supabase "Reset Password" email template for Price Tracker (Phase 42, in-app
  code flow).

  Paste into: Supabase dashboard → Authentication → Email Templates → Reset
  Password. The app verifies a 6-digit code, so the template MUST surface
  {{ .Token }}. No web link is included — the user types this code into the app.

  Inline styles only (email clients strip <style>/external CSS).
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
       style="background:#f6f8fc;margin:0;padding:32px 0;font-family:Segoe UI,Roboto,Arial,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" width="440" cellpadding="0" cellspacing="0"
             style="background:#ffffff;border:1px solid #e7ebf5;border-radius:16px;padding:40px 36px;">
        <tr>
          <td align="center" style="font-size:26px;color:#4f63d2;padding-bottom:8px;">&#128722;</td>
        </tr>
        <tr>
          <td align="center" style="font-size:22px;font-weight:600;color:#1b1f27;padding-bottom:12px;">
            Reset your password
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:15px;line-height:1.55;color:#5b6472;padding-bottom:20px;">
            We got a request to reset your Price Tracker password. Enter this
            code in the app to choose a new one:
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:20px;">
            <div style="display:inline-block;background:#eef1f8;border:1px solid #cdd3df;border-radius:12px;
                        padding:14px 28px;font-size:30px;font-weight:700;letter-spacing:8px;color:#1b1f27;">
              {{ .Token }}
            </div>
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:13px;line-height:1.55;color:#8a909c;padding-bottom:6px;">
            This code expires shortly. If you didn't request a reset, you can
            safely ignore this email — your password won't change.
          </td>
        </tr>
        <tr>
          <td align="center" style="border-top:1px solid #e7ebf5;padding-top:18px;font-size:13px;color:#8a909c;">
            &#128722; Price Tracker
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
